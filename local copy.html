  <head>
   <meta charset="UTF-8">
   <title>Top Border Only</title>
   <style>
     .top-border-box {
       width: 300px;
       padding: 10px;
       margin: 50px auto;
       text-align: center;
      border: solid;
         border-width: 0 0 0 0; /* No borders on left, right, bottom */
         border-top: 5px solid #000; 
     }
   </style>
 </head>
 <body>
 
   <div class="top-border-box">
     This box has a top border only.
   </div>
 
 </body>
